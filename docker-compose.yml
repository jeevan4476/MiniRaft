version: "3.8"

services:
  frontend:
    image: oven/bun:latest
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: bun run dev
    environment:
      - NODE_ENV=development

  gateway:
    image: oven/bun:latest
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./gateway:/app
      - /app/node_modules
    environment:
      - REPLICA_URLS=http://replica1:9001,http://replica2:9002,http://replica3:9003
      - GATEWAY_PORT=8080
    command: bun run --watch index.ts
    depends_on:
      - replica1
      - replica2
      - replica3

  replica1:
    image: cosmtrek/air:latest
    working_dir: /app
    ports:
      - "9001:9001"
    volumes:
      - ./replica1:/app
    environment:
      - REPLICA_ID=replica1
      - PORT=9001
      - PEERS=http://replica2:9002,http://replica3:9003

  replica2:
    image: cosmtrek/air:latest
    working_dir: /app
    ports:
      - "9002:9002"
    volumes:
      - ./replica2:/app
    environment:
      - REPLICA_ID=replica2
      - PORT=9002
      - PEERS=http://replica1:9001,http://replica3:9003

  replica3:
    image: cosmtrek/air:latest
    working_dir: /app
    ports:
      - "9003:9003"
    volumes:
      - ./replica3:/app
    environment:
      - REPLICA_ID=replica3
      - PORT=9003
      - PEERS=http://replica1:9001,http://replica2:9002

networks:
  default:
    name: miniraft-network
